name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev linux-libc-dev

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test
